<style>

    .tilet-band {

    .salon-name {
        font-family: 'Cinzel', serif;
        font-size: 3.5rem;

        text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
    }

    .tagline {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        color: var(--text-muted);
        font-size: 1.3rem;
    }

    .info-card, .heritage-intro, .pricing-container, .booking-form {
        background: var(--card-bg);

    .item-name, h3, .form-group label { color: #ffffff !important; }

    .section-title {
        color: var(--luxury-gold);
        font-family: 'Cinzel', serif;
